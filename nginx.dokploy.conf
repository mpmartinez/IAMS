# IAMS-only nginx for running behind Dokploy's Traefik on the Hetzner box.
# Traefik terminates TLS and routes iams.m2netsolutions.com/api -> the API
# container; everything else -> this nginx (plain HTTP on :80), which serves
# only the Blazor WASM static files. No TLS here (Traefik does it).
events { worker_connections 1024; }

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/wasm application/octet-stream;
    gzip_min_length 1000;

    server {
        listen 80;
        server_name iams.m2netsolutions.com;
        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        location = /service-worker.js {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }

        location ~* \.wasm$ {
            types { application/wasm wasm; }
            add_header Cache-Control "public, max-age=31536000";
        }
        location ~* \.(js|css|woff|woff2|ttf|eot|dll|dat|blat|png|jpg|jpeg|gif|ico|svg|webmanifest)$ {
            add_header Cache-Control "public, max-age=31536000";
        }
    }
}
